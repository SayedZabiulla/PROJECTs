<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collaboration Whiteboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="toolbar">
            <h2>Whiteboard</h2>
            <div class="tools">
                <button class="tool-btn active" data-tool="pen">✏️ Pen</button>
                <button class="tool-btn" data-tool="eraser">🧹 Eraser</button>
                <button class="tool-btn" data-tool="sticky">📝 Sticky Note</button>
                <button class="tool-btn" data-tool="rectangle">▭ Rectangle</button>
                <button class="tool-btn" data-tool="circle">⭕ Circle</button>
                <input type="color" id="colorPicker" value="#000000">
                <input type="range" id="brushSize" min="1" max="20" value="3">
                <button id="clearBtn">🗑️ Clear</button>
                <button id="downloadBtn">💾 Download</button>
            </div>
        </div>
        <canvas id="whiteboard"></canvas>
        <div id="stickyContainer"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
